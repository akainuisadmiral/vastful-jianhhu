<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vastful Jianghu</title>
    <style>
        /* --- RESET & BASE STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: #e0e0e0;
        }

        /* --- SCREEN MANAGEMENT --- */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }
        .hidden {
            display: none !important;
        }

        /* --- START SCREEN (VIDEO BACKGROUND) --- */
        #screen-start {
            background: transparent;
        }
        h1 {
            font-size: 2.5rem;
            color: #daa520;
            text-shadow: 2px 2px 4px #000;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 1rem;
            color: #bbb;
            text-shadow: 1px 1px 2px #000;
            margin-bottom: 40px;
        }

        /* --- GAMEPLAY INTERFACE --- */
        #screen-game {
            justify-content: flex-start;
            background-color: #121212;
        }
        .game-header {
            width: 100%;
            padding: 10px 0;
            border-bottom: 1px solid #333;
            color: #daa520;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        .console-box {
            flex: 1;
            width: 100%;
            max-width: 500px;
            background-color: #0a0a0a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 15px;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 15px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .console-line {
            margin-bottom: 8px;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* --- BUTTONS & CONTROLS --- */
        .btn {
            background-color: #222;
            color: #daa520;
            border: 1px solid #daa520;
            padding: 12px 28px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            background-color: #daa520;
            color: #121212;
            transform: scale(0.98);
        }
        .action-area {
            width: 100%;
            max-width: 500px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <!-- 🎬 START SCREEN -->
    <div id="screen-start" class="screen">
        <!-- Background Video configuration optimized for Mobile/WebIntoApp -->
        <video autoplay loop muted playsinline style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1;">
            <source src="background.mp4" type="video/mp4">
        </video>
        
        <h1>VASTFUL JIANGHU</h1>
        <div class="subtitle">A Mobile Text Wuxia RPG</div>
        <button class="btn" id="btn-enter-game" style="z-index: 2;">ENTER WORLD</button>
    </div>

    <!-- ⚔️ GAMEPLAY SCREEN -->
    <div id="screen-game" class="screen hidden">
        <div class="game-header">Vastful Jianghu v1.0</div>
        
        <div class="console-box" id="game-console">
            <!-- Game logs dynamically generate here -->
        </div>

        <div class="action-area">
            <button class="btn" id="btn-explore">Explore Wilds</button>
            <button class="btn" id="btn-rest">Rest at Tavern</button>
        </div>
    </div>

    <script>
        // --- DOM ELEMENTS ---
        const screenStart = document.getElementById('screen-start');
        const screenGame = document.getElementById('screen-game');
        const btnEnterGame = document.getElementById('btn-enter-game');
        const btnExplore = document.getElementById('btn-explore');
        const btnRest = document.getElementById('btn-rest');
        const gameConsole = document.getElementById('game-console');

        // --- GAME SYSTEM LOGIC ---
        function logToConsole(text) {
            const line = document.createElement('div');
            line.className = 'console-line';
            line.innerText = `> ${text}`;
            gameConsole.appendChild(line);
            gameConsole.scrollTop = gameConsole.scrollHeight;
        }

        // --- EVENT LISTENERS ---
        btnEnterGame.addEventListener('click', () => {
            screenStart.classList.add('hidden');
            screenGame.classList.remove('hidden');
            logToConsole("Welcome to the Jianghu, young traveler.");
            logToConsole("The paths ahead are filled with blade masters and ancient secrets. Choose your action.");
        });

        btnExplore.addEventListener('click', () => {
            const encounters = [
                "You wander into the bamboo forest and find a discarded broken sword.",
                "An old martial artist nods at you while passing by.",
                "You practice your internal breathing techniques near the waterfall. Qi +1.",
                "A rogue thief ambushes you! You dodge effortlessly."
            ];
            const randomEvent = encounters[Math.floor(Math.random() * encounters.length)];
            logToConsole(randomEvent);
        });

        btnRest.addEventListener('click', () => {
            logToConsole("You drink a warm cup of tea at the local tavern. Health and energy restored.");
        });
    </script>
</body>
</html>
