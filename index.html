<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vastful Jianghu - RPG</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; padding: 0; background-color: #1a1a1a; color: #e0e0e0; font-family: 'Courier New', Courier, monospace; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; }
        
        #game-container { width: 100vw; height: 100vh; max-width: 600px; max-height: 900px; border: 2px solid #444; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow: hidden; }
        
        /* 🖼️ Screen Frameworks with Transparent Overlays */
        #screen-start, #screen-auth { 
            width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; position: absolute; top: 0; left: 0; z-index: 10;
            background: rgba(0, 0, 0, 0.3);
        }
        #screen-auth { display: none; z-index: 5; }
        
        #screen-game { 
            display: none; width: 100%; height: 100%; flex-direction: column; z-index: 1; padding: 10px; position: absolute; top: 0; left: 0;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('dashboard-bg.jpg') no-repeat center center;
            background-size: cover;
        }

        /* 🎬 Background Video Container Layer */
        .video-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1;
        }

        .hidden { display: none !important; }
        h1 { color: #d4af37; font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px #000; letter-spacing: 2px; text-align: center; }
        .subtitle { color: #888; font-style: italic; margin-bottom: 40px; font-size: 1rem; text-align: center; }
        .btn { background-color: #8b0000; color: #fff; border: 2px solid #d4af37; padding: 15px 30px; font-size: 1.2rem; font-family: inherit; cursor: pointer; border-radius: 5px; box-shadow: 0 4px #5a0000; transition: all 0.1s ease; width: 80%; max-width: 300px; margin: 10px 0; text-align: center; -webkit-tap-highlight-color: transparent; }
        .btn:active { box-shadow: 0 1px #5a0000; transform: translateY(3px); }
        .btn-small { padding: 8px 15px; font-size: 0.9rem; width: auto; margin: 5px; box-shadow: 0 2px #5a0000; }
        .btn-small:active { box-shadow: 0 0px #5a0000; transform: translateY(2px); }
        
        .auth-box { width: 100%; max-width: 320px; background: rgba(34, 34, 34, 0.9); border: 1px solid #444; padding: 25px; border-radius: 8px; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); backdrop-filter: blur(3px); }
        .auth-box h2 { color: #d4af37; margin-top: 0; text-align: center; font-size: 1.5rem; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .form-group label { font-size: 0.85rem; color: #aaa; margin-bottom: 5px; text-transform: uppercase; }
        .form-group input { background: #333; border: 1px solid #555; padding: 12px; color: #fff; font-family: inherit; font-size: 1rem; border-radius: 4px; outline: none; }
        .form-group input:focus { border-color: #d4af37; }
        .auth-toggle { text-align: center; margin-top: 15px; font-size: 0.9rem; color: #aaa; }
        .auth-toggle span { color: #d4af37; cursor: pointer; text-decoration: underline; }
        
        #hud { display: grid; grid-template-columns: 1fr 1fr; background: rgba(34, 34, 34, 0.9); border: 1px solid #444; padding: 10px; border-radius: 5px; font-size: 0.9rem; margin-bottom: 10px; backdrop-filter: blur(3px); }
        .hud-item { margin: 3px 0; }
        .hud-label { color: #aaa; }
        .hud-val { color: #fff; font-weight: bold; }
        .hud-val.gold { color: #d4af37; }
        #log-container { flex: 1; background: rgba(26, 26, 26, 0.9); border: 1px solid #444; border-radius: 5px; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; margin-bottom: 10px; box-shadow: inset 0 0 8px rgba(0,0,0,0.8); backdrop-filter: blur(3px); }
        .log-entry { margin: 4px 0; font-size: 0.9rem; line-height: 1.3; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
        .log-system { color: #888; }
        .log-combat-win { color: #4caf50; }
        .log-combat-lose { color: #f44336; }
        .log-loot { color: #00bcd4; }
        .log-level { color: #e91e63; font-weight: bold; }
        #action-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 5px 0; }
        #action-panel .btn { width: 100%; max-width: none; margin: 0; padding: 12px; font-size: 1rem; }
        #header-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(34, 34, 34, 0.9); padding: 5px 10px; border-radius: 5px; margin-bottom: 5px; border: 1px solid #444; backdrop-filter: blur(3px); }
        #user-display { font-size: 0.85rem; color: #d4af37; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

    <div id="game-container">
        
        <!-- 🎬 SHARED VIDEO LAYER FOR AUTH SCREENS -->
        <video id="video-background" autoplay loop muted playsinline class="video-bg">
            <source src="background.mp4" type="video/mp4">
        </video>

        <div id="screen-start">
            <h1>VASTFUL JIANGHU</h1>
            <div class="subtitle">A Mobile Text Wuxia RPG</div>
            <button class="btn" id="btn-enter-game">ENTER WORLD</button>
        </div>

        <div id="screen-auth">
            <div class="auth-box">
                <h2 id="auth-title">LOGIN TO REALM</h2>
                <div class="form-group">
                    <label for="auth-username">Character Name</label>
                    <input type="text" id="auth-username" placeholder="Enter name...">
                </div>
                <div class="form-group">
                    <label for="auth-password">Secret Passphrase</label>
                    <input type="password" id="auth-password" placeholder="Enter passphrase...">
                </div>
                <button class="btn" id="btn-auth-submit" style="width:100%; max-width:none; margin-top:10px;">CONFIRM</button>
                <div class="auth-toggle" id="auth-toggle-msg">
                    New wanderer? <span id="auth-toggle-btn">Create Account</span>
                </div>
            </div>
        </div>

        <div id="screen-game">
            <div id="header-bar">
                <div id="user-display">Wanderer: <span id="lbl-username">...</span></div>
                <button class="btn btn-small" id="btn-logout" style="margin:0; background:#444; border-color:#666; box-shadow:0 2px #222;">LOGOUT</button>
            </div>

            <div id="hud">
                <div class="hud-item"><span class="hud-label">LEVEL:</span> <span class="hud-val" id="val-level">1</span></div>
                <div class="hud-item"><span class="hud-label">EXP:</span> <span class="hud-val" id="val-exp">0/100</span></div>
                <div class="hud-item"><span class="hud-label">HEALTH:</span> <span class="hud-val" id="val-hp">100/100</span></div>
                <div class="hud-item"><span class="hud-label">GOLD:</span> <span class="hud-val gold" id="val-gold">0</span></div>
            </div>

            <div id="log-container">
                <div class="log-entry log-system">Welcome to the Vastful Jianghu. Your story begins here...</div>
            </div>

            <div id="action-panel">
                <button class="btn" id="btn-train">TRAIN KUNG FU</button>
                <button class="btn" id="btn-adventure" style="background-color: #b8860b;">ADVENTURE</button>
                <button class="btn" id="btn-heal" style="background-color: #2e8b57;">HEAL (10 Gold)</button>
                <button class="btn" id="btn-leaderboard" style="background-color: #4682b4;">RANKINGS</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <script>
        // 🔒 Firebase Project Configuration Data
        const firebaseConfig = {
            apiKey: "AIzaSyDpnEdQB6wlrVaBcfYu0dnQI2UKDpvj5Q4",
            authDomain: "vastful-jianghu-33fd1.firebaseapp.com",
            databaseURL: "https://vastful-jianghu-33fd1-default-rtdb.firebaseio.com",
            projectId: "vastful-jianghu-33fd1",
            storageBucket: "vastful-jianghu-33fd1.firebasestorage.app",
            messagingSenderId: "247858596281",
            appId: "1:247858596281:web:442879b5f5b8b0491a0e68"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Application State
        let currentScreen = 'start';
        let authMode = 'login'; 
        let currentUser = null;
        let isPlayerVerified = false; 
        let playerData = { level: 1, exp: 0, hp: 100, maxHp: 100, gold: 0 };

        // DOM elements
        const screenStart = document.getElementById('screen-start');
        const screenAuth = document.getElementById('screen-auth');
        const screenGame = document.getElementById('screen-game');
        const videoBackground = document.getElementById('video-background');
        const btnEnterGame = document.getElementById('btn-enter-game');
        const btnAuthSubmit = document.getElementById('btn-auth-submit');
        const authToggleMsg = document.getElementById('auth-toggle-msg');
        const authTitle = document.getElementById('auth-title');
        const inputUser = document.getElementById('auth-username');
        const inputPass = document.getElementById('auth-password');
        const lblUsername = document.getElementById('lbl-username');
        const btnLogout = document.getElementById('btn-logout');
        const logContainer = document.getElementById('log-container');

        // Game HUD Elements
        const valLevel = document.getElementById('val-level');
        const valExp = document.getElementById('val-exp');
        const valHp = document.getElementById('val-hp');
        const valGold = document.getElementById('val-gold');

        // Action Buttons
        const btnTrain = document.getElementById('btn-train');
        const btnAdventure = document.getElementById('btn-adventure');
        const btnHeal = document.getElementById('btn-heal');
        const btnLeaderboard = document.getElementById('btn-leaderboard');

        // Screen Navigation
        function changeScreen(screenName) {
            screenStart.style.display = 'none';
            screenAuth.style.display = 'none';
            screenGame.style.display = 'none';
            
            if (screenName === 'start') {
                screenStart.style.display = 'flex';
                videoBackground.style.display = 'block';
            }
            if (screenName === 'auth') {
                screenAuth.style.display = 'flex';
                videoBackground.style.display = 'block';
            }
            if (screenName === 'game') {
                screenGame.style.display = 'flex';
                videoBackground.style.display = 'none'; // Turn off entry video during dashboard gameplay
            }
            currentScreen = screenName;
        }

        // Trigger safe screen switch to auth panel
        btnEnterGame.addEventListener('click', () => {
            changeScreen('auth');
        });

        // Safe Event Delegation for dynamic login/register toggle element
        authToggleMsg.addEventListener('click', (e) => {
            if (e.target && e.target.id === 'auth-toggle-btn') {
                if (authMode === 'login') {
                    authMode = 'register';
                    authTitle.innerText = 'CREATE ACCOUNT';
                    authToggleMsg.innerHTML = 'Already registered? <span id="auth-toggle-btn">Login here</span>';
                } else {
                    authMode = 'login';
                    authTitle.innerText = 'LOGIN TO REALM';
                    authToggleMsg.innerHTML = 'New wanderer? <span id="auth-toggle-btn">Create Account</span>';
                }
            }
        });

        // Authentication Submission Processing
        btnAuthSubmit.addEventListener('click', () => {
            const username = inputUser.value.trim().toLowerCase();
            const password = inputPass.value.trim();

            if (!username || !password) {
                alert('Please enter both character name and passphrase.');
                return;
            }
            if (username.length < 3) {
                alert('Character name must be at least 3 characters.');
                return;
            }

            const safeUsername = username.replace(/[.#$\[\]]/g, ""); 
            const userRef = database.ref('users/' + safeUsername);

            if (authMode === 'login') {
                userRef.once('value').then((snapshot) => {
                    if (snapshot.exists()) {
                        const account = snapshot.val();
                        if (account.password && account.password === password) {
                            currentUser = safeUsername;
                            isPlayerVerified = true; 
                            playerData = account.data || { level: 1, exp: 0, hp: 100, maxHp: 100, gold: 0 };
                            loginSuccess();
                        } else {
                            alert('Incorrect passphrase for this character.');
                        }
                    } else {
                        alert('Character does not exist. Switch to Create Account if new.');
                    }
                }).catch(() => {
                    alert('Authentication process error.');
                });
            } else {
                userRef.once('value').then((snapshot) => {
                    if (snapshot.exists()) {
                        alert('This character name is already taken.');
                    } else {
                        const newPlayerData = { level: 1, exp: 0, hp: 100, maxHp: 100, gold: 0 };
                        userRef.set({
                            password: password,
                            data: newPlayerData
                        }).then(() => {
                            currentUser = safeUsername;
                            isPlayerVerified = true;
                            playerData = newPlayerData;
                            alert('Account created successfully!');
                            loginSuccess();
                        });
                    }
                });
            }
        });

        function loginSuccess() {
            lblUsername.innerText = currentUser.toUpperCase();
            updateHud();
            logContainer.innerHTML = `<div class="log-entry log-system">You have stepped into the world as ${currentUser.toUpperCase()}...</div>`;
            changeScreen('game');
            inputUser.value = '';
            inputPass.value = '';
        }

        btnLogout.addEventListener('click', () => {
            saveGameData();
            currentUser = null;
            isPlayerVerified = false;
            changeScreen('start');
        });

        function saveGameData() {
            if (currentUser && isPlayerVerified) {
                database.ref('users/' + currentUser + '/data').set(playerData);
            }
        }

        function updateHud() {
            valLevel.innerText = playerData.level;
            valExp.innerText = `${playerData.exp}/${playerData.level * 100}`;
            valHp.innerText = `${playerData.hp}/${playerData.maxHp}`;
            valGold.innerText = playerData.gold;
        }

        function addLog(text, type = 'system') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerText = text;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // Gameplay Actions Engine
        btnTrain.addEventListener('click', () => {
            if (!isPlayerVerified) return;
            if (playerData.hp <= 10) {
                addLog("You are too exhausted to train. Rest or heal first!", "combat-lose");
                return;
            }
            const hpLoss = Math.floor(Math.random() * 6) + 5;
            const expGain = Math.floor(Math.random() * 11) + 10;
            playerData.hp = Math.max(1, playerData.hp - hpLoss);
            playerData.exp += expGain;
            addLog(`You practice your stances. Lost ${hpLoss} HP. Gained ${expGain} EXP.`, "system");
            checkLevelUp();
            updateHud();
            saveGameData();
        });

        btnAdventure.addEventListener('click', () => {
            if (!isPlayerVerified) return;
            if (playerData.hp <= 15) {
                addLog("Too wounded to venture out! Heal up.", "combat-lose");
                return;
            }
            const win = Math.random() > 0.4;
            if (win) {
                const goldGain = Math.floor(Math.random() * 15) + 5;
                const expGain = Math.floor(Math.random() * 16) + 15;
                playerData.gold += goldGain;
                playerData.exp += expGain;
                addLog(`⚔️ Victory! Defeated a rogue bandit. Found +${goldGain} Gold, +${expGain} EXP.`, "combat-win");
            } else {
                const hpLoss = Math.floor(Math.random() * 21) + 15;
                playerData.hp = Math.max(1, playerData.hp - hpLoss);
                addLog(`💥 Ambushed! A rival martial artist overpowered you. Lost ${hpLoss} HP.`, "combat-lose");
            }
            checkLevelUp();
            updateHud();
            saveGameData();
        });

        btnHeal.addEventListener('click', () => {
            if (!isPlayerVerified) return;
            if (playerData.gold < 10) {
                addLog("You don't have enough Gold to buy medicine.", "system");
                return;
            }
            if (playerData.hp >= playerData.maxHp) {
                addLog("Your vital energy is already full.", "system");
                return;
            }
            playerData.gold -= 10;
            playerData.hp = playerData.maxHp;
            addLog("🍵 Drank a medicinal herbal tea. Vitality fully restored!", "loot");
            updateHud();
            saveGameData();
        });

        function checkLevelUp() {
            const nextLevelExp = playerData.level * 100;
            if (playerData.exp >= nextLevelExp) {
                playerData.exp -= nextLevelExp;
                playerData.level += 1;
                playerData.maxHp += 20;
                playerData.hp = playerData.maxHp;
                addLog(`🌟 LEVEL UP! You reached Level ${playerData.level}! Your cultivation breaks through!`, "level");
            }
        }

        btnLeaderboard.addEventListener('click', () => {
            addLog("Fetching realm rankings...", "system");
            database.ref('users').orderByChild('data/level').limitToLast(5).once('value').then((snapshot) => {
                if (!snapshot.exists()) {
                    addLog("No rankings found yet.", "system");
                    return;
                }
                addLog("--- TOP WANDERERS ---", "loot");
                let leaders = [];
                snapshot.forEach((child) => {
                    const val = child.val();
                    if(val && val.data) {
